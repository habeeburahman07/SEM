<div class="max-w-4xl mx-auto px-4 py-8 flex flex-col gap-6">
  <!-- Header -->
  <header class="flex justify-between items-center border-b border-gray-200 pb-4">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">SEM Workspace</h1>
      <p class="text-xs text-gray-500 flex items-center gap-1.5 mt-0.5">
        <span>Logged in as:</span>
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100">
          {{ authService.currentUser()?.username }}
        </span>
      </p>
    </div>
    <div class="flex items-center gap-3">
      <button (click)="logout()" class="px-4 py-2 border border-gray-200 hover:bg-gray-50 text-gray-700 text-sm font-medium rounded shadow-sm transition cursor-pointer">
        Logout
      </button>
    </div>
  </header>

  <!-- Welcome Card -->
  <main class="bg-white border border-gray-200 rounded-xl p-8 shadow-sm flex flex-col gap-4">
    <div class="flex items-center gap-4">
      <span class="inline-flex items-center justify-center p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-indigo-600">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </span>
      <div>
        <h2 class="text-lg font-bold text-gray-900">Welcome to SEM Workspace!</h2>
        <p class="text-sm text-gray-500">You are successfully logged in to the application.</p>
      </div>
    </div>
    <div class="border-t border-gray-100 pt-4 mt-2">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">User Details</h3>
      <div class="grid grid-cols-2 gap-4 text-sm">
        <div>
          <span class="text-gray-500 block">Username</span>
          <span class="font-semibold text-gray-900">{{ authService.currentUser()?.username }}</span>
        </div>
        <div>
          <span class="text-gray-500 block">User ID</span>
          <span class="font-mono text-xs text-gray-900">{{ authService.currentUser()?.id }}</span>
        </div>
      </div>
    </div>
  </main>
</div>
