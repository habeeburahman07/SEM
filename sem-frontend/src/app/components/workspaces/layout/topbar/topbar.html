<header class="flex items-center justify-between border-b border-white/5 pb-5 mb-8">
  <div class="flex items-center gap-3">
    <!-- Global Search Component -->
    <app-global-search 
      [(globalSearchQuery)]="globalSearchQuery"
      [(showGlobalSearchResults)]="showGlobalSearchResults"
      [results]="searchResults()"
      (selectTeam)="selectTeam.emit($event)"
      (selectPlayer)="selectPlayer.emit($event)"
      (selectEvent)="selectEvent.emit($event)"
      (selectCompetition)="selectCompetition.emit($event)"
      (selectVenue)="selectVenue.emit($event)"
      (selectMember)="selectMember.emit($event)" />
  </div>

  <div class="flex items-center gap-3">
    <!-- Workspace Switcher Select Dropdown -->
    <div class="relative min-w-[160px] max-w-[220px]">
      <select [ngModel]="workspace()?.id" (ngModelChange)="onSwitchWorkspace($event)"
        class="w-full bg-slate-900 border border-white/10 hover:border-violet-500/50 rounded-xl px-3 py-2 text-xs font-bold text-white outline-none cursor-pointer appearance-none transition-all truncate pr-8 shadow-sm">
        @for (ws of allWorkspaces(); track ws.id) {
          <option [value]="ws.id" class="bg-slate-900 text-white py-1.5">{{ ws.name }}</option>
        }
      </select>
      <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none">
        <i class="fi fi-rr-angle-small-down"></i>
      </span>
    </div>

    <!-- Notification Panel Component -->
    <app-notification-panel
      [(isNotificationOpen)]="isNotificationOpen"
      [pendingInvitations]="pendingInvitations()"
      [notifications]="notifications()"
      [unreadCount]="unreadNotificationsCount()"
      [isProcessingInvitation]="isProcessingInvitation()"
      (acceptInvitation)="acceptInvitation.emit($event)"
      (rejectInvitation)="rejectInvitation.emit($event)"
      (markNotificationsRead)="markNotificationsRead.emit()" />

    <!-- User Dropdown Component -->
    <app-user-dropdown
      [(isUserDropdownOpen)]="isUserDropdownOpen"
      [currentUser]="currentUser()"
      [userRoleSlug]="userRoleSlug()"
      [isUploadingAvatar]="isUploadingAvatar()"
      (signOut)="signOut.emit()"
      (avatarUpload)="avatarUpload.emit($event)" />
  </div>
</header>
