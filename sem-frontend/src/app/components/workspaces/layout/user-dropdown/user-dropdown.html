<div class="relative">
  <button (click)="isUserDropdownOpen.set(!isUserDropdownOpen())"
    class="flex items-center gap-3 bg-slate-900 hover:bg-slate-800/80 border border-white/5 rounded-xl px-4 py-2 text-left cursor-pointer transition-all">
    <!-- Profile Icon (Avatar) -->
    <div class="w-8 h-8 flex items-center justify-center shadow-sm select-none overflow-hidden relative">
      @if (isUploadingAvatar()) {
      <div class="absolute inset-0 bg-slate-950/85 flex items-center justify-center z-10">
        <svg class="animate-spin h-4.5 w-4.5 text-violet-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
      </div>
      }
      <app-avatar [name]="currentUser()?.username || 'U'" [logoUrl]="currentUser()?.avatarUrl" customClass="w-8 h-8 rounded-lg flex-shrink-0" textClass="text-sm font-bold text-white" />
      <!-- Hover Upload Overlay -->
      <label
        class="absolute inset-0 bg-black/60 opacity-0 hover:opacity-100 flex items-center justify-center cursor-pointer transition-opacity z-20">
        <i class="fi fi-rr-camera text-white text-xs"></i>
        <input type="file" class="hidden" accept="image/*" (change)="onAvatarUpload($event)" />
      </label>
    </div>
    <div class="text-left leading-none pr-1">
      <p class="text-xs font-bold text-white">{{ currentUser()?.username }}</p>
      <p class="text-[9px] text-slate-500 font-mono mt-0.5 capitalize">{{ userRoleSlug() }}</p>
    </div>
    <i class="fi fi-rr-angle-small-down text-slate-400 text-sm transition-transform duration-200"
      [class.rotate-180]="isUserDropdownOpen()"></i>
  </button>

  <!-- Dropdown Menu -->
  @if (isUserDropdownOpen()) {
  <!-- Backdrop to close -->
  <div class="fixed inset-0 z-30 bg-black/0 cursor-default" (click)="isUserDropdownOpen.set(false)"></div>

  <div
    class="absolute right-0 mt-2 w-48 bg-slate-900 border border-white/10 rounded-xl shadow-2xl py-1.5 z-40 animate-fadeIn shrink-0">
    <div class="px-4 py-2 border-b border-white/5 mb-1.5">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Signed in as</p>
      <p class="text-xs font-bold text-white truncate mt-0.5">{{ currentUser()?.username }}</p>
    </div>

    <!-- My Profile Option -->
    <a routerLink="/profile" (click)="isUserDropdownOpen.set(false)"
      class="flex items-center gap-2.5 px-4 py-2 text-xs text-slate-300 hover:text-white hover:bg-white/5 transition-all cursor-pointer">
      <i class="fi fi-rr-user text-sm"></i>
      My Profile
    </a>

    <!-- System Settings option -->
    <a routerLink="/system-settings" (click)="isUserDropdownOpen.set(false)"
      class="flex items-center gap-2.5 px-4 py-2 text-xs text-slate-300 hover:text-white hover:bg-white/5 transition-all cursor-pointer">
      <i class="fi fi-rr-settings text-sm"></i>
      System Settings
    </a>

    <div class="border-t border-white/5 my-1.5"></div>

    <button (click)="signOut.emit(); isUserDropdownOpen.set(false)"
      class="w-full flex items-center gap-2.5 px-4 py-2 text-xs text-rose-400 hover:text-rose-300 hover:bg-rose-500/5 transition-all cursor-pointer text-left border-0 bg-transparent">
      <i class="fi fi-rr-sign-out-alt text-sm"></i>
      Sign Out
    </button>
  </div>
  }
</div>
