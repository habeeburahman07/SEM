<!-- Mobile Header / Navbar -->
<div
  class="lg:hidden flex items-center justify-between px-6 h-16 border-b border-white/10 bg-slate-900 sticky top-0 z-40">
  <div class="flex items-center gap-3">
    <button (click)="isSidebarOpen.set(!isSidebarOpen())"
      [attr.aria-expanded]="isSidebarOpen()"
      aria-label="Toggle sidebar menu"
      class="text-white text-xl p-1 cursor-pointer rounded-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <i class="fi text-sm" [class.fi-rr-cross]="isSidebarOpen()" [class.fi-rr-menu-burger]="!isSidebarOpen()"></i>
    </button>
    <span class="font-extrabold text-sm text-white truncate">{{ workspace()?.name }}</span>
  </div>
  <div class="flex items-center gap-3">
    <span class="text-xs text-slate-500 font-mono">/{{ workspace()?.slug }}</span>
  </div>
</div>

<!-- Sidebar Backdrop (Mobile Only) -->
@if (isSidebarOpen()) {
<div (click)="isSidebarOpen.set(false)"
  class="lg:hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 transition-all duration-300"></div>
}

<!-- Sidebar -->
<aside [class.w-64]="isSidebarOpen()" [class.translate-x-0]="isSidebarOpen()" [class.w-0]="!isSidebarOpen()"
  [class.-translate-x-full]="!isSidebarOpen()" [class.lg:w-64]="isSidebarOpen()" [class.lg:w-20]="!isSidebarOpen()"
  [class.lg:translate-x-0]="true"
  class="fixed inset-y-0 left-0 bg-slate-900 border-r border-white/10 flex flex-col z-50 lg:z-10 lg:static lg:h-screen transition-all duration-300 ease-in-out shrink-0 overflow-hidden">

  <!-- Sidebar Workspace Header -->
  <div [class.lg:px-0]="!isSidebarOpen()"
    class="p-6 border-b border-white/5 flex items-center justify-between gap-3">
    <div [class.lg:flex-col]="!isSidebarOpen()" [class.lg:mx-auto]="!isSidebarOpen()"
      class="flex items-center gap-3 min-w-0">
      <app-avatar (click)="isSidebarOpen.set(!isSidebarOpen())"
        [name]="workspace()?.name || ''"
        [logoUrl]="workspace()?.logoUrl"
        customClass="w-10 h-10 rounded-xl shadow-md shrink-0 cursor-pointer hover:scale-105 transition-all"
        textClass="text-base font-extrabold text-white" />
      <div [class.lg:hidden]="!isSidebarOpen()" class="min-w-0">
        <h2 class="text-sm font-extrabold text-white truncate">{{ workspace()?.name }}</h2>
        <p class="text-[10px] text-slate-500 font-mono truncate">/{{ workspace()?.slug }}</p>
      </div>
    </div>
  </div>

  <!-- Navigation Menu -->
  <nav [class.lg:px-2.5]="!isSidebarOpen()"
    aria-label="Workspace Navigation"
    class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-1">
    
    <button (click)="activeTab.set('overview'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'overview' ? 'page' : null"
      [class]="activeTab() === 'overview' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <i class="fi fi-rr-apps text-base shrink-0"></i>
      <span [class.lg:hidden]="!isSidebarOpen()">Overview</span>
    </button>

    <button (click)="activeTab.set('members'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'members' ? 'page' : null"
      [class]="activeTab() === 'members' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center justify-between px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <span class="flex items-center gap-3 min-w-0" [class.lg:justify-center]="!isSidebarOpen()"
        [class.w-full]="!isSidebarOpen()">
        <i class="fi fi-rr-users text-base shrink-0"></i>
        <span [class.lg:hidden]="!isSidebarOpen()">Members</span>
      </span>
      @if (isSidebarOpen()) {
      <span class="px-2 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded-md border border-white/5">{{
        membersCount() }}</span>
      }
    </button>

    <button (click)="activeTab.set('teams'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'teams' ? 'page' : null"
      [class]="activeTab() === 'teams' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center justify-between px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <span class="flex items-center gap-3 min-w-0" [class.lg:justify-center]="!isSidebarOpen()"
        [class.w-full]="!isSidebarOpen()">
        <i class="fi fi-rr-users-alt text-base shrink-0"></i>
        <span [class.lg:hidden]="!isSidebarOpen()">Teams</span>
      </span>
      @if (isSidebarOpen()) {
      <span class="px-2 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded-md border border-white/5">{{
        teamsCount() }}</span>
      }
    </button>

    <button (click)="activeTab.set('players'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'players' ? 'page' : null"
      [class]="activeTab() === 'players' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center justify-between px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <span class="flex items-center gap-3 min-w-0" [class.lg:justify-center]="!isSidebarOpen()"
        [class.w-full]="!isSidebarOpen()">
        <i class="fi fi-rr-running text-base shrink-0"></i>
        <span [class.lg:hidden]="!isSidebarOpen()">Players</span>
      </span>
      @if (isSidebarOpen()) {
      <span class="px-2 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded-md border border-white/5">{{
        playersCount() }}</span>
      }
    </button>

    <button (click)="activeTab.set('events'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'events' ? 'page' : null"
      [class]="activeTab() === 'events' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center justify-between px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <span class="flex items-center gap-3 min-w-0" [class.lg:justify-center]="!isSidebarOpen()"
        [class.w-full]="!isSidebarOpen()">
        <i class="fi fi-rr-trophy text-base shrink-0"></i>
        <span [class.lg:hidden]="!isSidebarOpen()">Events</span>
      </span>
      @if (isSidebarOpen()) {
      <span class="px-2 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded-md border border-white/5">{{
        eventsCount() }}</span>
      }
    </button>

    <button (click)="activeTab.set('venues'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'venues' ? 'page' : null"
      [class]="activeTab() === 'venues' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center justify-between px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <span class="flex items-center gap-3 min-w-0" [class.lg:justify-center]="!isSidebarOpen()"
        [class.w-full]="!isSidebarOpen()">
        <i class="fi fi-rr-marker text-base shrink-0"></i>
        <span [class.lg:hidden]="!isSidebarOpen()">Venues</span>
      </span>
      @if (isSidebarOpen()) {
      <span class="px-2 py-0.5 text-[10px] bg-slate-800 text-slate-400 rounded-md border border-white/5">{{
        venuesCount() }}</span>
      }
    </button>

    <button (click)="activeTab.set('reports'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'reports' ? 'page' : null"
      [class]="activeTab() === 'reports' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <i class="fi fi-rr-chart-pie text-base shrink-0"></i>
      <span [class.lg:hidden]="!isSidebarOpen()">Reports</span>
    </button>

    @if (hasSettingsPermission()) {
    <button (click)="activeTab.set('settings'); closeSidebarOnMobile()"
      [attr.aria-current]="activeTab() === 'settings' ? 'page' : null"
      [class]="activeTab() === 'settings' ? 'bg-violet-600/10 text-violet-400 border border-violet-500/20' : 'text-slate-400 hover:text-white border border-transparent hover:bg-white/5'"
      [class.lg:justify-center]="!isSidebarOpen()" [class.lg:px-0]="!isSidebarOpen()"
      class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl transition-all cursor-pointer outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-violet-500">
      <i class="fi fi-rr-settings text-base shrink-0"></i>
      <span [class.lg:hidden]="!isSidebarOpen()">Settings</span>
    </button>
    }
  </nav>
</aside>
