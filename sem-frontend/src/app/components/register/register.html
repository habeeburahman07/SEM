<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 border border-gray-200 rounded-xl shadow-lg transition hover:shadow-xl">
    <div>
      <div class="flex justify-center">
        <span class="inline-flex items-center justify-center p-3 bg-indigo-50 border border-indigo-100 rounded-lg text-indigo-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </span>
      </div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
        Create an account
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Or
        <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition">
          sign in to your account
        </a>
      </p>
    </div>

    @if (errorMessage()) {
      <div class="rounded-md bg-rose-50 border border-rose-100 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-rose-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-semibold text-rose-800">
              Registration Error
            </h3>
            <div class="mt-1 text-xs text-rose-700">
              <p>{{ errorMessage() }}</p>
            </div>
          </div>
        </div>
      </div>
    }

    @if (successMessage()) {
      <div class="rounded-md bg-emerald-50 border border-emerald-100 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-semibold text-emerald-800">
              Registration Successful
            </h3>
            <div class="mt-1 text-xs text-emerald-700">
              <p>{{ successMessage() }}</p>
            </div>
          </div>
        </div>
      </div>
    }

    <form class="mt-8 space-y-6" (submit)="onSubmit(); $event.preventDefault()">
      <div class="rounded-md shadow-sm space-y-4">
        <div class="flex flex-col gap-1.5">
          <label for="reg-username" class="text-xs font-semibold text-gray-600">Username</label>
          <input
            id="reg-username"
            name="username"
            type="text"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
            placeholder="Choose a username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            autocomplete="username"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="reg-password" class="text-xs font-semibold text-gray-600">Password</label>
          <input
            id="reg-password"
            name="password"
            type="password"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
            placeholder="•••••••• (min 6 characters)"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            autocomplete="new-password"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="confirm-password" class="text-xs font-semibold text-gray-600">Confirm Password</label>
          <input
            id="confirm-password"
            name="confirmPassword"
            type="password"
            required
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-400 text-gray-900 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
            placeholder="••••••••"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            autocomplete="new-password"
          />
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="isLoading() || !username().trim() || !password().trim() || !confirmPassword().trim() || password().length < 6 || password() !== confirmPassword()"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed transition cursor-pointer"
        >
          @if (isLoading()) {
            <span class="flex items-center gap-2">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating account...
            </span>
          } @else {
            Register
          }
        </button>
      </div>
    </form>
  </div>
</div>
