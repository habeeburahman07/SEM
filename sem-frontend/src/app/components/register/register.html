<div class="min-h-screen flex items-center justify-center bg-slate-950 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-slate-900 p-8 border border-white/5 rounded-2xl shadow-2xl transition hover:shadow-3xl">
    <div>
      <div class="flex justify-center">
        <span class="inline-flex items-center justify-center p-3.5 bg-violet-600/10 border border-violet-500/20 rounded-xl text-violet-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </span>
      </div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-white tracking-tight">
        Create an account
      </h2>
      <p class="mt-2 text-center text-xs text-slate-400">
        Or
        <a routerLink="/login" class="font-bold text-violet-400 hover:text-violet-300 transition">
          sign in to your account
        </a>
      </p>
    </div>

    @if (errorMessage()) {
      <div class="rounded-xl bg-rose-500/10 border border-rose-500/20 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-rose-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-semibold text-rose-300">
              Registration Error
            </h3>
            <div class="mt-1 text-xs text-rose-400/80">
              <p>{{ errorMessage() }}</p>
            </div>
          </div>
        </div>
      </div>
    }

    @if (successMessage()) {
      <div class="rounded-xl bg-emerald-500/10 border border-emerald-500/20 p-4">
        <div class="flex">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-emerald-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-semibold text-emerald-300">
              Registration Successful
            </h3>
            <div class="mt-1 text-xs text-emerald-400/80">
              <p>{{ successMessage() }}</p>
            </div>
          </div>
        </div>
      </div>
    }

    <form class="mt-8 space-y-6" (submit)="onSubmit(); $event.preventDefault()">
      <div class="rounded-md space-y-5">
        <div class="flex flex-col gap-1.5">
          <label for="reg-username" class="text-xs font-semibold text-slate-400">Username</label>
          <input
            id="reg-username"
            name="username"
            type="text"
            required
            class="appearance-none relative block w-full px-4 py-3 bg-slate-950 border border-white/10 placeholder-slate-600 text-white rounded-xl focus:outline-none focus:border-violet-500 text-xs transition"
            placeholder="Choose a username"
            [ngModel]="username()"
            (ngModelChange)="username.set($event)"
            autocomplete="username"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="reg-password" class="text-xs font-semibold text-slate-400">Password</label>
          <div class="relative">
            <input
              id="reg-password"
              name="password"
              [type]="showPassword() ? 'text' : 'password'"
              required
              class="appearance-none relative block w-full pl-4 pr-10 py-3 bg-slate-950 border border-white/10 placeholder-slate-600 text-white rounded-xl focus:outline-none focus:border-violet-500 text-xs transition"
              placeholder="•••••••• (min 6 chars, 1 uppercase, 1 number)"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              autocomplete="new-password"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-200 transition cursor-pointer"
            >
              <i class="fi text-xs" [class.fi-rr-eye]="showPassword()" [class.fi-rr-eye-crossed]="!showPassword()"></i>
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="confirm-password" class="text-xs font-semibold text-slate-400">Confirm Password</label>
          <div class="relative">
            <input
              id="confirm-password"
              name="confirmPassword"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              required
              class="appearance-none relative block w-full pl-4 pr-10 py-3 bg-slate-950 border border-white/10 placeholder-slate-600 text-white rounded-xl focus:outline-none focus:border-violet-500 text-xs transition"
              placeholder="••••••••"
              [ngModel]="confirmPassword()"
              (ngModelChange)="confirmPassword.set($event)"
              autocomplete="new-password"
            />
            <button
              type="button"
              (click)="showConfirmPassword.set(!showConfirmPassword())"
              class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-200 transition cursor-pointer"
            >
              <i class="fi text-xs" [class.fi-rr-eye]="showConfirmPassword()" [class.fi-rr-eye-crossed]="!showConfirmPassword()"></i>
            </button>
          </div>
        </div>
      </div>

      <div>
        <button
          type="submit"
          [disabled]="isLoading() || !username().trim() || !password().trim() || !confirmPassword().trim() || password().length < 6 || !(/[A-Z]/.test(password())) || !(/[0-9]/.test(password())) || password() !== confirmPassword()"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-xs font-bold rounded-xl text-white bg-violet-600 hover:bg-violet-500 disabled:opacity-50 disabled:cursor-not-allowed transition cursor-pointer"
        >
          @if (isLoading()) {
            <span class="flex items-center gap-2">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating account...
            </span>
          } @else {
            Register
          }
        </button>
      </div>
    </form>
  </div>
</div>
